<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Cash Reward Offer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #000000 0%, #1C1C1E 50%, #2C2C2E 100%);
        color: #111;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 16px;
      }

      .container {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .hidden { display: none !important; }

      /* PAGE 1 - QUALIFIER */
      .qualifier-page {
        text-align: center;
      }

      .badge {
        display: inline-block;
        background: linear-gradient(135deg, #00C853, #00E676);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 20px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .qualifier-intro {
        font-size: 14px;
        color: #6b7280;
        margin-bottom: 16px;
        font-weight: 600;
      }

      .qualifier-headline {
        font-size: 28px;
        font-weight: 800;
        line-height: 1.3;
        margin-bottom: 32px;
        color: #1f2937;
      }

      .qualifier-subtext {
        font-size: 16px;
        color: #6b7280;
        margin-bottom: 32px;
        line-height: 1.5;
      }

      .location-options {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 24px;
      }

      .location-btn {
        padding: 24px 20px;
        border: 3px solid #e5e7eb;
        border-radius: 16px;
        background: white;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
        font-size: 18px;
        font-weight: 700;
        color: #1f2937;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .location-btn:hover {
        border-color: #00C853;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0, 200, 83, 0.2);
      }

      .location-icon {
        font-size: 32px;
      }

      /* PAGE 2 - MAIN LANDER */
      .main-lander {
        text-align: center;
      }

      .headline {
        font-size: 32px;
        font-weight: 800;
        line-height: 1.2;
        margin-bottom: 24px;
        background: linear-gradient(90deg, #000000, #00C853);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.8px;
      }

      .money-highlight {
        color: #00C853;
        font-weight: 900;
        font-size: 1.2em;
        background: none;
        -webkit-text-fill-color: #00C853;
        display: inline-block;
      }

      .timer-box {
        background: #E8F5E9;
        border: 2px solid #00C853;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 24px;
        text-align: center;
      }

      .timer-text {
        font-size: 14px;
        color: #00C853;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .timer {
        font-size: 24px;
        font-weight: 800;
        color: #0A0D1C;
        letter-spacing: 1px;
      }

      .trust-badges {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 16px;
        background: #F9FAFB;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 13px;
        color: #6b7280;
      }

      .trust-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .checkmark {
        color: #00C853;
        font-weight: 700;
        font-size: 16px;
      }

      .steps-simple {
        text-align: left;
        margin-bottom: 24px;
        padding: 16px;
        background: #E8F5E9;
        border-radius: 12px;
        border-left: 4px solid #00C853;
      }

      .steps-simple div {
        font-size: 14px;
        color: #1f2937;
        margin-bottom: 8px;
        line-height: 1.6;
      }

      .steps-simple div:last-child {
        margin-bottom: 0;
      }

      .steps-simple strong {
        color: #00C853;
        font-weight: 700;
      }

      .btn-primary {
        background: linear-gradient(135deg, #00C853, #00E676);
        color: #fff;
        padding: 18px;
        font-size: 17px;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 6px 20px rgba(0, 200, 83, 0.4);
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 200, 83, 0.5);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .disclaimer {
        font-size: 11px;
        color: #9ca3af;
        text-align: center;
        margin-top: 16px;
        line-height: 1.5;
      }

      footer {
        margin-top: 24px;
        padding: 16px;
        text-align: center;
        font-size: 12px;
        color: rgba(255,255,255,0.8);
      }

      footer a {
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        margin: 0 8px;
      }

      footer a:hover { color: white; }

      @media (max-width: 480px) {
        .container { padding: 28px 20px; }
        .headline { font-size: 28px; }
        .qualifier-headline { font-size: 24px; }
      }
    </style>
